# =============================================================================
# Sock Shop — MIST core configuration (3rd SUT; SP1 bundle, same shape as bookinfo)
# =============================================================================
# Deliberately MINIMAL: it relies on the generalization defaults (auth.mode=none,
# smart-fetch OAS = oas.path, conf basePath auto-applied, jaeger localhost) so that
# a NEW SUT works from swagger + 2 properties + traces with NO hand-fixed config.
# =============================================================================

api=SockShop

# Generator: MST switches on the multi-service workflow + loads mst.config.path.
generator=MST
mst.config.path=sockshop-mst.properties

testsperoperation=20

# Inputs: the SUT's own swagger + the conf generated FROM it (basePath auto-applied).
oas.path=openapi/sockshop-swagger.yaml
conf.path=real-system-conf.yaml

test.target.dir=mist-cli/src/test/java
test.target.package=sockshop
experiment.name=sockshop_generalization
testclass.name=SockShopTest

experiment.execute=true
allure.report=true
testcases.check=false
deletepreviousresults=true
coverage.input=false
coverage.output=false
stats.csv=true

numtotaltestcases=-1
max.iterations=1
delay=-1

faulty.ratio=0.8
faulty.dependency.ratio=0.05
reloadinputdataevery=50
inputdatamaxvalues=500

# Sock Shop front-end (port-forwarded). The swagger basePath is "/" (root), so the
# conf testPaths are /catalogue, /catalogue/{id}, ... — basePath auto-apply is a no-op
# here (correctly), unlike bookinfo's /api/v1.
base.url=http://localhost:8080

logToFile=true
data.log.dir=logs
data.log.file=sockshop_test_execution

# MST trace input (Jaeger traces captured from the live SUT).
trace.file.path=traces
