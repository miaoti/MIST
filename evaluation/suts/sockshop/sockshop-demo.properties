# =============================================================================
# Sock Shop — MIST core configuration (3rd SUT; SP1 bundle, same shape as bookinfo)
# =============================================================================
# Deliberately MINIMAL: it relies on the generalization defaults (auth.mode=none,
# smart-fetch OAS = oas.path, conf basePath auto-applied, jaeger localhost) so that
# a NEW SUT works from swagger + 2 properties + traces with NO hand-fixed config.
# =============================================================================

api=SockShop

# Generator: MST switches on the multi-service workflow (MST section below).
generator=MST

testsperoperation=20

# Inputs: the SUT's own swagger + the conf generated FROM it (basePath auto-applied).
oas.path=openapi/sockshop-swagger.yaml
conf.path=real-system-conf.yaml

test.target.dir=mist-cli/src/test/java
test.target.package=sockshop
experiment.name=sockshop_generalization
testclass.name=SockShopTest

experiment.execute=true
allure.report=true
testcases.check=false
deletepreviousresults=true
coverage.input=false
coverage.output=false
stats.csv=true

numtotaltestcases=-1
max.iterations=1
delay=-1

faulty.ratio=0.8
faulty.dependency.ratio=0.05
reloadinputdataevery=50
inputdatamaxvalues=500

# Sock Shop front-end (port-forwarded). The swagger basePath is "/" (root), so the
# conf testPaths are /catalogue, /catalogue/{id}, ... — basePath auto-apply is a no-op
# here (correctly), unlike bookinfo's /api/v1.
base.url=http://localhost:8080

logToFile=true
data.log.dir=logs
data.log.file=sockshop_test_execution

# MST trace input (Jaeger traces captured from the live SUT).
trace.file.path=traces


# =============================================================================
# MST configuration (merged from sockshop-mst.properties — single-file config)
# =============================================================================
# =============================================================================
# Sock Shop — MST (multi-service) configuration. Minimal on purpose.
# =============================================================================
# NOTE what is DELIBERATELY ABSENT (now covered by generalization defaults):
#   - no auth.* block          -> auth.mode defaults to none (Sock Shop needs no login)
#   - no smart.input.fetch.openapi.spec.path -> defaults to oas.path (the SUT's swagger)
#   - no fault.detection.injected.faults.path -> absent => no named faults
# If Sock Shop runs end-to-end with this file, the generalization holds.
# =============================================================================

# -------- MST step generation --------
mst.generate.only.first.step=true
test.variants.per.scenario=10
faulty.round-robin=true
negative.input.generation.mode=smart

# -------- trace merging --------
trace.merge.max.session.gap.micros=60000000
trace.merge.max.roots.per.scenario=10

# -------- Root API Registry (per-SUT, written into this bundle) --------
root.api.registry.enabled=true
root.api.registry.path=root-api-registry.json

# -------- Fault detection (no injected faults file: Sock Shop has none) --------
fault.detection.enabled=true
fault.detection.report.dir=logs/fault-detection-reports

# -------- HTTP timeouts --------
http.connect.timeout.ms=10000
http.socket.timeout.ms=30000

# -------- LLM (DeepSeek, OpenAI-compatible) --------
llm.enabled=true
llm.model.type=openai_compatible
mist.llm.cache.read=auto
mist.llm.cache.write=true
llm.openai_compatible.enabled=true
llm.openai_compatible.url=https://api.deepseek.com/v1/chat/completions
llm.openai_compatible.model=deepseek-chat
llm.openai_compatible.api.key=${DEEPSEEK_API_KEY}
llm.rate.limit.retry.enabled=true
llm.rate.limit.max.retries=3
llm.seed.count=5

# -------- LLM communication logging --------
llm.communication.logging.enabled=true
llm.communication.logging.dir=logs/llm-communications
llm.communication.logging.file.prefix=llm-communication
llm.communication.logging.include.content=true
llm.communication.logging.level=INFO
llm.communication.logging.max.content.length=-1

# -------- LLM response validation (soft-error). Overridable via -D for isolation. --------
llm.response.validation.enabled=true
llm.response.validation.only.2xx=true
llm.response.validation.include.rca=true
soft.error.cache.enabled=true

# -------- Jaeger (shared local Jaeger via the Istio addon) --------
jaeger.enabled=true
jaeger.base.url=http://localhost:16686/jaeger/api
jaeger.lookback=10m

# -------- Smart Input Fetching (OAS path now defaults to oas.path) --------
smart.input.fetch.enabled=true
smart.input.fetch.percentage=1.0
smart.input.fetch.registry.path=input-fetch-registry.yaml
smart.input.fetch.llm.discovery.enabled=true
smart.input.fetch.max.candidates=5
smart.input.fetch.dependency.resolution.enabled=true
smart.input.fetch.discovery.timeout.ms=5000
smart.input.fetch.cache.enabled=true
smart.input.fetch.cache.ttl.seconds=300

# -------- Test Case Enhancer --------
test.enhancer.enabled=true
test.enhancer.rounds=1
test.enhancer.skip.5xx=true
mst.enhancer.parallelism=8
mst.enhancer.dedup.negative=true
mst.enhancer.cache.enabled=true
mst.enhancer.cache.path=.mist/enhancement-cache.json

# -------- Status Code Exploration --------
status.code.exploration.enabled=true
status.code.exploration.max.per.test=3
status.code.exploration.max.per.round=20

# -------- Verbose logging --------
verbose.parameter.generation=true
verbose.test.case.creation=true
logging.level.root=INFO

# -------- Trace Shape Oracle: hidden-downstream + ORACLE ANOMALIES report --------
mst.oracle.shape.invariants.hidden_downstream_failure.enabled=true
