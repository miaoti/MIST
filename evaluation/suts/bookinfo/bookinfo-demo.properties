# =============================================================================
# Bookinfo — MIST core configuration
# =============================================================================
# This file holds ONLY MIST-core keys (the same set classic generators
# RT/CBT/ART/FT/LLM understand). All MST-specific keys (LLM, smart fetch,
# jaeger, fault detection, soft-error cache, enhancer, status-code exploration,
# root-API registry, trace merging, verbose MST logging, ...) live in the file
# pointed to by mst.config.path.
# =============================================================================


# API name (used for the Allure report header)
api=TrainTicket


# ---------------------------------------------------------------------------
# Generator selection
# ---------------------------------------------------------------------------
# Test case generator (RT, CBT, ART, FT, LLM, MST, ...). MST switches on the
# multi-service workflow which additionally loads mst.config.path below.
generator=MST

# Path to the MST-only configuration file (only consulted when generator=MST).
mst.config.path=bookinfo-mst.properties


# ---------------------------------------------------------------------------
# Inputs and outputs
# ---------------------------------------------------------------------------
# Number of test cases per operation per iteration
testsperoperation=20

# Path to the OpenAPI specification (single file or already merged)
oas.path=openapi/bookinfo-swagger.yaml

# Path to the test configuration (multi-service YAML for MST)
conf.path=real-system-conf.yaml

# Directory where test classes are generated
test.target.dir=mist-cli/src/test/java

# Java package name (must be a valid Java identifier - no hyphens)
test.target.package=bookinfo

# Experiment name (used as a folder/file identifier)
experiment.name=bookinfo_hidden_downstream

# Test class name prefix
testclass.name=BookinfoTest


# ---------------------------------------------------------------------------
# Execution toggles
# ---------------------------------------------------------------------------
experiment.execute=true
allure.report=true
testcases.check=false
deletepreviousresults=true

# Coverage measurement (skipped automatically for MST due to multi-service config)
coverage.input=false
coverage.output=false

# Enable CSV statistics
stats.csv=true


# ---------------------------------------------------------------------------
# Iteration / volume controls
# ---------------------------------------------------------------------------
# Maximum total number of test cases to generate (-1 for the natural stop)
numtotaltestcases=-1

# Maximum number of iterations (set to 1 for single generation)
max.iterations=1

# Optional delay between iterations in seconds (-1 for no delay)
delay=-1


# ---------------------------------------------------------------------------
# Fault generation (shared with classic CBT/ART)
# ---------------------------------------------------------------------------
# Ratio of faulty (negative) test cases per operation
faulty.ratio=0.8

# CBT-only: ratio of faulty test cases due to broken inter-parameter dependencies
faulty.dependency.ratio=0.05

# CBT-only: number of test cases between input data reloads
reloadinputdataevery=50

# CBT-only: maximum number of values per parameter
inputdatamaxvalues=500


# ---------------------------------------------------------------------------
# Target system
# ---------------------------------------------------------------------------
# Base URL for the Bookinfo system (used by both MST and classic writers)
base.url=http://localhost:8080


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logToFile=true
data.log.dir=logs
data.log.file=bookinfo_test_execution

# MST trace input. Either a single Jaeger/OpenTelemetry trace file
# (.json or .jsonl) or a directory containing multiple such files. When the
# key is omitted, falls back to the hardcoded path
# `src/main/resources/My-Example/trainticket/test-trace` so the bundled
# trainticket demo runs out of the box.
trace.file.path=traces
