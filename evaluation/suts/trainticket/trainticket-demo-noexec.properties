# =============================================================================
# TrainTicket (fault-injection SUT) — MIST core configuration (self-contained bundle)
# MST-specific keys (LLM, smart fetch, jaeger, fault detection, auth, ...) live in
# the file pointed to by mst.config.path. Input paths resolve against THIS file's
# directory, so the bundle's openapi/conf/traces are found from anywhere.
# =============================================================================
api=TrainTicket
generator=MST
mst.config.path=trainticket-mst-noexec.properties

# Inputs (bundle-relative)
testsperoperation=20
oas.path=openapi/merged_openapi_spec.yaml
conf.path=real-system-conf.yaml
trace.file.path=traces

# Outputs
test.target.dir=mist-cli/src/test/java
test.target.package=trainticket
experiment.name=trainticket_local_noexec
testclass.name=TrainTicketLocalTest

# Execution
experiment.execute=false
allure.report=false
testcases.check=false
deletepreviousresults=true
coverage.input=false
coverage.output=false
stats.csv=true
numtotaltestcases=-1
max.iterations=1
delay=-1

# Fault generation
faulty.ratio=0.8
faulty.dependency.ratio=0.05
reloadinputdataevery=50
inputdatamaxvalues=500

# Target system — a LOCAL deploy (deploy/deploy.sh), NOT the authors' lab host.
base.url=http://localhost:8080

logToFile=true
data.log.dir=logs
data.log.file=trainticket_local
