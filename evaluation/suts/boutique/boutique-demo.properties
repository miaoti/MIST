# =============================================================================
# Online Boutique — MIST core configuration (4th SUT; SP1 bundle, same shape as bookinfo/sockshop)
# =============================================================================
# Online Boutique's only HTTP service is the `frontend` (server-rendered HTML);
# the rest are internal gRPC. This SUT's role is the 2nd hidden-downstream
# demonstration over gRPC: with adservice down, the home page still returns 200
# while the swallowed frontend->adservice gRPC span carries otel=ERROR.
# =============================================================================

api=OnlineBoutique

# Generator: MST switches on the multi-service workflow + loads mst.config.path.
generator=MST
mst.config.path=boutique-mst.properties

testsperoperation=20

# Inputs: the SUT's own swagger + the conf generated FROM it.
oas.path=openapi/boutique-swagger.yaml
conf.path=real-system-conf.yaml

test.target.dir=mist-cli/src/test/java
test.target.package=boutique
experiment.name=boutique_hidden_downstream
testclass.name=BoutiqueTest

experiment.execute=true
allure.report=true
testcases.check=false
deletepreviousresults=true
coverage.input=false
coverage.output=false
stats.csv=true

numtotaltestcases=-1
max.iterations=1
delay=-1

faulty.ratio=0.8
faulty.dependency.ratio=0.05
reloadinputdataevery=50
inputdatamaxvalues=500

# Online Boutique frontend, reached via a dedicated port-forward
# (kubectl port-forward -n boutique svc/frontend 8081:80 — see deploy/deploy.sh).
# basePath is "/" so the conf testPaths are /, /product/{id}, /cart, ... at root.
base.url=http://localhost:8081

logToFile=true
data.log.dir=logs
data.log.file=boutique_test_execution

# MST trace input (Jaeger traces captured from the live SUT).
trace.file.path=traces
