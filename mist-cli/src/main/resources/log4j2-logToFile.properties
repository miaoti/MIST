status = error
name = PropertiesConfig

# Global gate: everything at INFO+ flows out of the loggers.
filters = threshold
filter.threshold.type = ThresholdFilter
filter.threshold.level = info

# ---- Console appender ------------------------------------------------------
# WARN+ only. INFO chatter (per-parameter LLM logs, smart-fetch debug, the 50
# "Set system property: X = Y" lines, exploration metadata, banner art) stays
# in the log file but is no longer printed. Direct System.out / progress-bar
# output is unaffected so the user still sees high-level status + progress.
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %-5p %m%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = warn

# ---- Rolling file appender -------------------------------------------------
# Unchanged: INFO level, full pattern with timestamp/logger/line — this is
# the audit trail under logs/<experiment>/<file>.log.
appender.rolling.type = RollingFile
appender.rolling.name = fileLogger
appender.rolling.fileName = ${sys:logFilename}.log
appender.rolling.filePattern= ${sys:logFilename}_%dT%d{HH:mm:ss.SSS}.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=50MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 5

rootLogger.level = info
rootLogger.appenderRefs = stdout, rolling
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.rolling.ref = fileLogger
