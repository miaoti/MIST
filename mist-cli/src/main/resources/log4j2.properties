status = error
name = PropertiesConfig

# Scan our own util package so log4j picks up the @Plugin-annotated
# ConsoleDedupFilter without requiring the annotation-processor-generated
# Log4j2Plugins.dat manifest (which Maven sometimes skips for downstream
# modules that depend on this jar).
packages = io.mist.core.util

# Global gate: everything at INFO+ flows out of the loggers. DEBUG entries
# are suppressed before reaching any appender.
filters = threshold
filter.threshold.type = ThresholdFilter
filter.threshold.level = info

appenders = console, rolling

# ---- Console appender ------------------------------------------------------
# WARN+ only. INFO chatter (per-parameter LLM logs, smart-fetch debug, the
# bridged-property echoes, exploration metadata, banner art) stays in the
# log file but is NOT printed to the terminal. Direct System.out output
# (used by ConsoleProgressBar) is unaffected so the user still sees the
# progress bar without it being buried in noise.
#
# Two filters in order:
#   1. ThresholdFilter   — drops everything below WARN before dedupe sees it.
#   2. ConsoleDedupFilter — suppresses byte-identical WARN/ERROR messages
#      seen within mst.console.dedup.ttl.ms (default 5000ms). Smart-fetch
#      retries against a 5xx endpoint and parameter-validator rejections of
#      the same value at multiple locations otherwise fire 3-5x in a row.
#      The file appender has NO dedupe so every retry is recorded.
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %-5p %m%n
# Dedup filter only (single filter — no enumeration needed). The WARN threshold
# lives on the rootLogger.appenderRef.stdout.level below, which is the canonical
# log4j2 way to gate an appender by level. The previous attempt to combine
# threshold+dedupe at the appender level required a `filters = a, b` enumeration
# that log4j2 silently mis-handled for our config, so INFO leaked to terminal.
appender.console.filter.dedupe.type = ConsoleDedupFilter
appender.console.filter.dedupe.ttlMillis = 5000

# ---- Rolling file appender -------------------------------------------------
# INFO level, full pattern with timestamp/logger/line — this is the audit
# trail. Defaults to logs/mist.log when -DlogFilename is not set, so the
# tool works out of the box without any IDE configuration.
appender.rolling.type = RollingFile
appender.rolling.name = fileLogger
appender.rolling.fileName = ${sys:logFilename:-logs/mist}.log
appender.rolling.filePattern= ${sys:logFilename:-logs/mist}_%dT%d{HH:mm:ss.SSS}.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=50MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 5

# Third-party logger overrides. Most OpenAPI specs in this repo carry minor
# spec-omission warnings (missing inline schemas for *Map_string_Link_, etc.)
# that the Swagger parser reports at INFO. They have no effect on test
# generation and burying real warnings, so cap the parser at WARN.
loggers = swagger
logger.swagger.name = io.swagger
logger.swagger.level = warn

rootLogger.level = info
rootLogger.appenderRefs = stdout, rolling
rootLogger.appenderRef.stdout.ref = STDOUT
# Per-appender-ref level: events with level < WARN never reach STDOUT, regardless
# of which logger emits them. This is the part that was failing before. The file
# appender keeps INFO+ unchanged (no .level set = inherits root).
rootLogger.appenderRef.stdout.level = warn
rootLogger.appenderRef.rolling.ref = fileLogger
