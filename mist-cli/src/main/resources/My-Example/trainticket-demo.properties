# =============================================================================
# Train-ticket — MIST core configuration
# =============================================================================
# This file holds ONLY MIST-core keys (the same set classic generators
# RT/CBT/ART/FT/LLM understand). MST-specific keys (LLM, smart fetch, jaeger,
# fault detection, enhancer, status-code exploration, root-API registry, trace
# merging, ...) live in the MST section at the bottom of THIS SAME FILE — one
# file per SUT is the whole configuration. (A split overlay via mst.config.path
# is still supported but no bundled demo uses it.)
# =============================================================================


# API name (used for the Allure report header)
api=TrainTicket


# ---------------------------------------------------------------------------
# Generator selection
# ---------------------------------------------------------------------------
# Test case generator (RT, CBT, ART, FT, LLM, MST, ...). MST switches on the
# multi-service workflow, which also reads the MST section below.
generator=MST



# ---------------------------------------------------------------------------
# Inputs and outputs
# ---------------------------------------------------------------------------
# Number of test cases per operation per iteration
testsperoperation=100

# Path to the OpenAPI specification (single file or already merged)
oas.path=trainticket/merged_openapi_spec 1.yaml

# Path to the test configuration (multi-service YAML for MST)
conf.path=trainticket/real-system-conf.yaml

# Directory where test classes are generated
test.target.dir=mist-cli/src/test/java

# Java package name (must be a valid Java identifier - no hyphens)
test.target.package=trainticket

# Experiment name (used as a folder/file identifier)
experiment.name=trainticket_twostage_test

# Test class name prefix
testclass.name=TrainTicketTwoStageTest


# ---------------------------------------------------------------------------
# Execution toggles
# ---------------------------------------------------------------------------
experiment.execute=true
allure.report=true
testcases.check=false
deletepreviousresults=true

# Coverage measurement (skipped automatically for MST due to multi-service config)
coverage.input=false
coverage.output=false

# Enable CSV statistics
stats.csv=true


# ---------------------------------------------------------------------------
# Iteration / volume controls
# ---------------------------------------------------------------------------
# Maximum total number of test cases to generate (-1 for the natural stop)
numtotaltestcases=-1

# Maximum number of iterations (set to 1 for single generation)
max.iterations=1

# Optional delay between iterations in seconds (-1 for no delay)
delay=-1


# ---------------------------------------------------------------------------
# Fault generation (shared with classic CBT/ART)
# ---------------------------------------------------------------------------
# Ratio of faulty (negative) test cases per operation
faulty.ratio=0.8

# CBT-only: ratio of faulty test cases due to broken inter-parameter dependencies
faulty.dependency.ratio=0.05

# CBT-only: number of test cases between input data reloads
reloadinputdataevery=50

# CBT-only: maximum number of values per parameter
inputdatamaxvalues=500


# ---------------------------------------------------------------------------
# Target system
# ---------------------------------------------------------------------------
# Base URL for the Train-ticket system (used by both MST and classic writers)
base.url=http://localhost:32677


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logToFile=true
data.log.dir=logs
data.log.file=trainticket_test_execution

# MST trace input. Either a single Jaeger/OpenTelemetry trace file
# (.json or .jsonl) or a directory containing multiple such files. When the
# key is omitted, falls back to the hardcoded path
# `src/main/resources/My-Example/trainticket/test-trace` so the bundled
# trainticket demo runs out of the box.
trace.file.path=trainticket/test-trace


# =============================================================================
# MST configuration (merged from trainticket-mst.properties — single-file config)
# =============================================================================
# =============================================================================
# Train-ticket MST (Multi-Service Testing) configuration
# =============================================================================
# This section holds every MST-only key (single-file config: core keys
# above, MST keys here). Classic generators (RT/CBT/ART/FT/LLM) ignore it.
#
# Loaded by io.mist.core.config.MstConfig.
# Every key here is also pushed to System properties so writer-emitted test
# code and downstream readers (smart fetcher, generators) keep working
# unchanged via System.getProperty.
# =============================================================================


# -----------------------------------------------------------------------------
# MST step generation control
# -----------------------------------------------------------------------------
# If true, generator keeps only the first business step per scenario (writer
# still logs in as step 0). When true, all top-level root APIs are kept and
# internal step-API / service-to-service spans are pruned. When false, every
# internal HTTP span in the trace also becomes its own step.
mst.generate.only.first.step=true

# Test variant generation (number of variants per scenario)
test.variants.per.scenario=10

# Faulty parameter selection strategy
# true (default): Round-robin - each faulty test has exactly ONE faulty parameter
# false: Random - randomly select one or more parameters per test case
faulty.round-robin=true


# -----------------------------------------------------------------------------
# Negative input generation
# -----------------------------------------------------------------------------
# Mode for generating invalid inputs for negative test cases.
#   smart    - LLM only for REGEX_MISMATCH + SEMANTIC_MISMATCH; static for the rest
#   llm      - LLM for all 6 contextual fault types (slower; research/ablation)
#   hardcode - Fully deterministic; zero LLM calls; fastest
negative.input.generation.mode=smart


# -----------------------------------------------------------------------------
# Session-based heuristic trace merging (Phase 2)
# -----------------------------------------------------------------------------
# Maximum time gap (microseconds) between consecutive traces from the same
# client IP for them to be merged into a single multi-root scenario.
trace.merge.max.session.gap.micros=60000000
# Maximum number of root steps allowed in one merged scenario (safety cap).
trace.merge.max.roots.per.scenario=10


# -----------------------------------------------------------------------------
# Root API Registry
# -----------------------------------------------------------------------------
# Tracks unique root APIs and their microservice interaction trees.
root.api.registry.enabled=true
root.api.registry.path=trainticket/root-api-registry.json
root.api.registry.debug.logging=false


# -----------------------------------------------------------------------------
# Fault detection tracking
# -----------------------------------------------------------------------------
fault.detection.enabled=true
fault.detection.injected.faults.path=trainticket/injectedFaults/injected-faults.json
fault.detection.report.dir=logs/fault-detection-reports


# -----------------------------------------------------------------------------
# HTTP timeouts for REST Assured test execution (milliseconds)
# Prevents tests from hanging when server doesn't respond.
# -----------------------------------------------------------------------------
http.connect.timeout.ms=10000
http.socket.timeout.ms=30000


# -----------------------------------------------------------------------------
# Authentication: how generated MST tests obtain and stamp their JWT
# -----------------------------------------------------------------------------
# Runtime handler: io.mist.cli.auth.MstAuthHandler
#
# auth.mode controls the strategy:
#   none         - no Authorization header on any request (anonymous)
#   static_token - use auth.static.token verbatim, never call login
#   per_jvm      - lazy login on first request, cached for the whole JVM
#                  (default; turns ~2400 logins per run into 1)
#   per_test     - legacy: a fresh login before every test method
auth.mode=per_jvm

# Login endpoint (relative to base.url). Only used in per_jvm / per_test mode.
auth.login.url=/api/v1/users/login
auth.login.username=admin
auth.login.password=222222
# JSON body template. ${username} and ${password} are substituted at runtime.
auth.login.body.template={"username":"${username}","password":"${password}"}
# JSON path used to extract the token from the login response body.
auth.login.token.json.path=data.token
# Expected HTTP status from the login endpoint.
auth.login.expected.status=200

# How the token is attached to every subsequent request.
auth.token.header=Authorization
auth.token.prefix=Bearer

# static_token mode only: paste a long-lived JWT here.
auth.static.token=

# When true, on a 401 the handler invalidates the cache and re-logs in once.
# (Currently advisory; trigger logic lives in the writer-emitted code.)
auth.refresh.on.401=true

# Default policy + per-path opt-out (C2): paths matching ANY of these regex
# (CSV) get NO Authorization header even when auth is otherwise enabled.
# Trainticket: actuator/health endpoints are unauthenticated; login itself
# obviously cannot require a token.
auth.required.default=true
auth.skip.path.patterns=^/actuator,^/api/v1/users/login,^/api/v1/users/register

# -----------------------------------------------------------------------------
# Smart Input Fetching backends still use these credentials
# -----------------------------------------------------------------------------
auth.admin.username=admin
auth.admin.password=222222
auth.user.username=fdse_microservice
auth.user.password=111111


# -----------------------------------------------------------------------------
# LLM configuration
# -----------------------------------------------------------------------------
llm.enabled=true

# Model selection: openai_compatible, gemini, or ollama
# 'openai_compatible' covers any chat-completions endpoint that implements
# OpenAI's /v1/chat/completions request/response shape -- DeepSeek, OpenAI,
# OpenRouter, Together, Groq, gpt4all, llama.cpp --api, etc. The codebase
# also accepts the legacy value 'local' as a deprecated alias.
llm.model.type=openai_compatible

# --------------------------------------------------------------------------
# LLM call cache -- controls SHA-256-keyed reuse of prior LLM responses.
# Cache file path: .mist/llm-call-cache.json (override via mist.llm.cache.path)
#
#   mist.llm.cache.read = auto | true | false
#       auto (default): READ the cache only when -Drandom.seed=<n> is set,
#                       so seeded runs reproduce byte-identically and
#                       unseeded benchmark runs hit the real LLM.
#       true:           ALWAYS read (use this to short-circuit LLM calls
#                       in a stable demo where the cache is pre-populated).
#       false:          NEVER read (every prompt goes to the LLM backend).
#
#   mist.llm.cache.write = true | false
#       true (default): write every LLM response into the cache so future
#                       runs (esp. seeded ones) can replay them.
#       false:          run-isolated -- don't touch the shared cache file
#                       (useful for one-off no-cache benchmarks).
#
# To get a fully fresh "no cache at all" run:
#       mist.llm.cache.read=false
#       mist.llm.cache.write=false
# Equivalent via JVM flag: -Dmist.llm.cache.read=false -Dmist.llm.cache.write=false
# Either source works; -D takes precedence over the .properties value.
mist.llm.cache.read=auto
mist.llm.cache.write=true
# --------------------------------------------------------------------------

# DeepSeek (OpenAI-compatible). To switch providers, change just the URL,
# model name, and API-key env var below.
llm.openai_compatible.enabled=true
llm.openai_compatible.url=https://api.deepseek.com/v1/chat/completions
llm.openai_compatible.model=deepseek-chat
llm.openai_compatible.api.key=${DEEPSEEK_API_KEY}

# Gemini (disabled while DeepSeek is active)
llm.gemini.enabled=false
llm.gemini.api.key=${GEMINI_API_KEY}
llm.gemini.model=gemini-2.0-flash-exp
llm.gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# Ollama (disabled while DeepSeek is active)
llm.ollama.enabled=false
llm.ollama.url=http://localhost:11434
llm.ollama.model=qwen2.5-coder:14b

# Rate limiting - DeepSeek can return 429 under load.
llm.rate.limit.retry.enabled=true
llm.rate.limit.max.retries=3

# Two-stage parameter generation
llm.seed.count=5


# -----------------------------------------------------------------------------
# LLM communication logging
# -----------------------------------------------------------------------------
llm.communication.logging.enabled=true
llm.communication.logging.dir=logs/llm-communications
llm.communication.logging.file.prefix=llm-communication
llm.communication.logging.include.response.time=true
llm.communication.logging.include.content=true
llm.communication.logging.include.metadata=true
llm.communication.logging.level=INFO
llm.communication.logging.max.content.length=-1


# -----------------------------------------------------------------------------
# LLM response validation (soft error detection)
# -----------------------------------------------------------------------------
# Detect "soft errors" - APIs that return 200 OK but include error info in body.
llm.response.validation.enabled=true
llm.response.validation.only.2xx=true
llm.response.validation.include.rca=true


# -----------------------------------------------------------------------------
# Soft error rule cache
# -----------------------------------------------------------------------------
# Cache LLM-generated validation rules per API to avoid redundant LLM calls.
soft.error.cache.enabled=true


# -----------------------------------------------------------------------------
# Resource monitoring (LOCAL & OLLAMA only; not online APIs like Gemini)
# -----------------------------------------------------------------------------
llm.resource.monitoring.enabled=true
llm.resource.monitoring.interval.ms=500
llm.resource.monitoring.include.detailed.memory=true
llm.resource.monitoring.include.cpu=true


# -----------------------------------------------------------------------------
# Jaeger trace fetching
# -----------------------------------------------------------------------------
jaeger.enabled=true
jaeger.base.url=http://localhost:30005/jaeger/ui/api
jaeger.lookback=10m


# -----------------------------------------------------------------------------
# Smart Input Fetching
# -----------------------------------------------------------------------------
smart.input.fetch.enabled=true
smart.input.fetch.percentage=1.0
smart.input.fetch.registry.path=trainticket/input-fetch-registry.yaml
smart.input.fetch.openapi.spec.path=trainticket/merged_openapi_spec 1.yaml
smart.input.fetch.llm.discovery.enabled=true
smart.input.fetch.max.candidates=5
smart.input.fetch.dependency.resolution.enabled=true
smart.input.fetch.discovery.timeout.ms=5000
smart.input.fetch.cache.enabled=true
smart.input.fetch.cache.ttl.seconds=300
smart.input.fetch.default.priority=5
smart.input.fetch.pattern.discovery.priority=5
smart.input.fetch.llm.discovery.priority=7
smart.input.fetch.http.content.type=application/json
smart.input.fetch.http.success.code=200
smart.input.fetch.schema.discovery.timeout.ms=3000


# -----------------------------------------------------------------------------
# Test Case Enhancer
# -----------------------------------------------------------------------------
# Analyzes failed test cases and uses LLM to suggest improved parameter values.
test.enhancer.enabled=true
test.enhancer.rounds=1
test.enhancer.skip.5xx=true

# Max concurrent LLM calls inside enhanceBatch. Default 8 stays under most
# provider rate limits (DeepSeek/OpenAI tier 1). Bump for higher tiers; lower
# if you observe HTTP 429s. Setting 1 reproduces legacy serial behavior.
mst.enhancer.parallelism=8

# When true, variants of the same scenario + fault + error pattern share one
# LLM call and the result is fanned out to each variant. The variant's
# distinctive invalid value is preserved because the LLM never produces a
# replacement for it (its name is locked in the prompt and absent from the
# enhancedParameters map). Set false to fall back to 1-call-per-test.
# Positive tests are NEVER deduped (P1 strategy): they retain per-variant
# identity because they have no locked-invalid parameter to preserve.
mst.enhancer.dedup.negative=true

# Persistent disk cache for enhancement results, keyed by canonical scenario
# fingerprint. Survives JVM restart so subsequent runs are near-instant on the
# same workload. Cache file is JSON; on-corruption the JVM refuses to start
# rather than silently dropping cached state.
mst.enhancer.cache.enabled=true

# Cache file path. Atomic temp+rename writes; created on first put.
mst.enhancer.cache.path=.mist/enhancement-cache.json


# -----------------------------------------------------------------------------
# Status Code Exploration
# -----------------------------------------------------------------------------
# Creates new test cases to explore untriggered HTTP status codes per API.
status.code.exploration.enabled=true
status.code.exploration.max.per.test=3
status.code.exploration.max.per.round=20

# Auth manipulation for 401/403 exploration
status.code.auth.invalid.token=INVALID_TOKEN_12345
status.code.auth.expired.token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkV4cGlyZWQiLCJleHAiOjF9.expired
status.code.auth.guest.user=guest
status.code.auth.guest.password=guest
status.code.auth.restricted.user=restricted_user
status.code.auth.restricted.password=restricted_pass


# -----------------------------------------------------------------------------
# Verbose logging for MST generation
# -----------------------------------------------------------------------------
verbose.parameter.generation=true
verbose.test.case.creation=true

logging.level.root=INFO
logging.level.io.mist.core.generation.MistGenerator=DEBUG
logging.level.io.mist.core.generation.AiDrivenLLMGenerator=DEBUG
logging.level.io.mist.core.workflow.TraceWorkflowExtractor=DEBUG


# -----------------------------------------------------------------------------
# Ablation toggles (H2 infrastructure)
# -----------------------------------------------------------------------------
# Drive the R1-R4 configurations from
# docs/mst-plans/PATH_B_POSITIONING.md section 4.2. Each key defaults to
# the value commented after it; uncomment + flip to override per run.
#
# Whole Trace Shape Oracle (R2 / R4 disable this).
#   mst.oracle.shape.enabled=true
#
# Per-invariant gates inside TraceShapeOracle.evaluate(...). Three default
# on, one (timing) defaults off because the paper revision dropped
# TimingEnvelope from the named contribution (commits b96fb8b6, dfc11b46).
#   mst.oracle.shape.invariants.span_tree.enabled=true
#   mst.oracle.shape.invariants.status_propagation.enabled=true
#   mst.oracle.shape.invariants.response_envelope.enabled=true
#   mst.oracle.shape.invariants.timing.enabled=false
#   mst.oracle.shape.invariants.target_attribution.enabled=true
#
# Thompson-sampling fault-queue scheduler. When false, the queue uses its
# original insertion order without constructing the bandit.
#   mst.scheduler.bandit.enabled=true
#
# Adaptive Fault Taxonomy (already gated pre-H2 by FaultMiner; default
# false so the registry-driven Sniper baseline stays byte-identical with
# the legacy enum behaviour). R1 / R2 enable this.
#   mist.fault.mining.enabled=false
