# DeepSeek configuration template (OpenAI-compatible HTTP endpoint).
#
# DeepSeek implements OpenAI's /v1/chat/completions request/response shape, so
# it shares this RESTest LLM backend with OpenAI, OpenRouter, Together, Groq,
# and any other OpenAI-compatible provider. To swap providers, change the URL,
# model name, and API-key env var below — nothing else.
#
# To use:
#   export DEEPSEEK_API_KEY=sk-...
#
# Then run RESTest with:
#   -Dllm.config=deepseek-config.properties
# OR copy the relevant llm.* lines below into your existing config (e.g.
# src/main/resources/My-Example/trainticket-demo.properties), making sure to
# set llm.model.type=openai_compatible and disable the others.
#
# DO NOT paste the literal sk-... key into this file — leave the ${ENV_VAR}
# reference so the secret stays out of git. The resolver also accepts
# -DDEEPSEEK_API_KEY=... as a JVM property fallback for IntelliJ run configs.

llm.enabled=true
llm.model.type=openai_compatible

# DeepSeek endpoint — OpenAI-compatible chat-completions API.
llm.openai_compatible.enabled=true
llm.openai_compatible.url=https://api.deepseek.com/v1/chat/completions
llm.openai_compatible.model=deepseek-chat
llm.openai_compatible.api.key=${DEEPSEEK_API_KEY}

# Disable the other backends.
llm.gemini.enabled=false
llm.ollama.enabled=false

# Rate-limit / retry behaviour shared across backends.
llm.rate.limit.retry.enabled=true
llm.rate.limit.max.retries=3

# LLM communication logging — same as the existing config.
llm.communication.logging.enabled=true
llm.communication.logging.dir=logs/llm-communications
llm.communication.logging.file.prefix=llm-communication
llm.communication.logging.include.response.time=true
llm.communication.logging.include.content=true
llm.communication.logging.include.metadata=true
llm.communication.logging.level=INFO
llm.communication.logging.max.content.length=-1
